<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythmax Web Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">Rhythmax</div>
    <div class="provider-tabs">
      <div class="tab active" data-p="tidal" onclick="setProvider('tidal',this)">
        <span class="tab-dot" style="background:var(--tidal)"></span>TIDAL
      </div>
      <div class="tab disabled" data-p="jiosaavn" title="Coming soon">
        <span class="tab-dot" style="background:var(--jiosaavn)"></span>JioSaavn
        <span class="pill-soon">Soon</span>
      </div>
      <div class="tab disabled" data-p="youtube" title="Coming soon">
        <span class="tab-dot" style="background:var(--youtube)"></span>YouTube
        <span class="pill-soon">Soon</span>
      </div>
    </div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search songs, artists, albums on TIDAL…"
        autocomplete="off" spellcheck="false"
        oninput="onSearchInput(this.value)"
        onkeydown="onSearchKey(event)" />
      <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
    </div>
    <div class="quality-wrap">
      <label class="quality-label">Quality</label>
      <select id="qualitySelect" onchange="onQualityChange(this.value)">
        <option value="LOW">Low · 96 kbps AAC</option>
        <option value="HIGH" selected>High · 320 kbps AAC</option>
        <option value="LOSSLESS">Lossless · upto 16bit 44.1 kHz FLAC</option>
        <option value="HI_RES_LOSSLESS">Hi-Res Lossless · upto 24bit 192 kHz FLAC</option>
      </select>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Library</div>
        <div class="nav-item active" onclick="showView('queue',this)"><div class="nav-icon">♫</div>Queue</div>
        <div class="nav-item" onclick="showView('liked',this)"><div class="nav-icon">♥</div>Liked Songs</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">TIDAL Instances</div>
        <div id="instanceList"><div class="inst-loading">Connecting…</div></div>
      </div>
      <div class="sidebar-section" style="flex:1">
        <div class="sidebar-label">Up Next</div>
      </div>
      <div class="queue-section" id="queuePanel">
        <div class="empty-hint">Search a song to start</div>
      </div>
    </aside>

    <div class="content">
      <div class="search-dropdown" id="searchDropdown"></div>

      <section class="hero">
        <div class="hero-art" id="heroArt">
          <div class="hero-art-placeholder" id="heroPlaceholder">🎵</div>
          <img id="heroCover" src="" alt="" />
          <div class="vinyl-ring paused" id="vinylRing"></div>
        </div>
        <div class="hero-info">
          <div class="hero-provider" id="heroProvider">● TIDAL</div>
          <div class="hero-title"  id="heroTitle">Search for a track to begin</div>
          <div class="hero-artist" id="heroArtist">Rhythmax for TIDAL</div>
          <div class="hero-meta">
            <div class="meta-item" id="heroQuality">—</div>
            <div class="meta-item" id="heroBitDepth"   style="display:none"></div>
            <div class="meta-item" id="heroSampleRate" style="display:none"></div>
            <div class="meta-item" id="heroBpm"        style="display:none"></div>
            <div class="meta-item" id="heroKey"        style="display:none"></div>
          </div>
          <div class="visualizer" id="visualizer"></div>
          <div class="progress-container">
            <div class="waveform-track" id="waveformTrack">
              <canvas id="waveformCanvas" height="48"></canvas>
            </div>
            <div class="progress-times">
              <span id="curTime">0:00</span>
              <span id="durTime">0:00</span>
            </div>
          </div>
          <div class="controls">
            <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M16 3h5v5M4 20l17-17M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
            </button>
            <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn primary" id="playBtn" onclick="togglePlay()">
              <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="nextTrack()" title="Next">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
            </button>
            <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
            </button>
            <div class="vol-group">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="color:var(--muted);flex-shrink:0"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" step="1" oninput="setVolume(this.value)" />
            </div>
          </div>

          <!-- Download button (hero) -->
          <div class="hero-download-row">
            <button class="dl-btn dl-idle" id="heroDownloadBtn" onclick="downloadTrack(S.queue[S.currentIdx], S.quality)" title="Download current track">
              <span class="dl-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
              <span class="dl-text">Download</span>
            </button>
            <div class="dl-quality-hint" id="dlQualityHint">—</div>
          </div>
        </div>
      </section>

      <section class="tracklist-section">
        <div class="section-header">
          <div class="section-title" id="listTitle">Queue</div>
          <div class="active-instance-badge" id="activeBadge"></div>
        </div>
        <div id="trackGrid" class="track-grid">
          <div class="empty-state">Search for songs above to build your queue</div>
        </div>
      </section>
    </div>
  </div>
</div>

<audio id="audioEl" crossorigin="anonymous" preload="auto"></audio>
<div class="toast" id="toast"></div>
<script src="downloader.js"></script>
<script src="player.js"></script>
</body>
</html>
